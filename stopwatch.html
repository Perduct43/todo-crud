<!DOCTYPE html>
<html>
<head>
    <title>Easy Stopwatch</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            padding-top: 50px;
        }
        #timer {
            font-size: 80px;
            margin-bottom: 20px;
        }
        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="timer">0</div>
    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Stop</button>
    <button onclick="resetTimer()">Reset</button>

    <script>
        let seconds = 0;
        let running = false;
        let interval;

        function startTimer() {
            if (running == false) {
                running = true;
                interval = setInterval(function() {
                    seconds = seconds + 1;
                    document.getElementById("timer").innerHTML = seconds;
                }, 1000);
            }
        }

        function stopTimer() {
            running = false;
            clearInterval(interval);
        }

        function resetTimer() {
            stopTimer();
            seconds = 0;
            document.getElementById("timer").innerHTML = seconds;
        }
    </script>

</body>
</html>
